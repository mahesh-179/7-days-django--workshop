{% extends "base.html" %}

{% block content %}

<h2>Our Tea Menu</h2>

<div class="menu-grid">
    {% for item in items %}

    <div class="menu-card">
        <h3>{{ item.name }}</h3>
        <p>{{ item.description }}</p>
        <p class="price">Rs {{ item.price }}</p>
    </div>

    {% endfor %}
</div>

{% endblock %}
