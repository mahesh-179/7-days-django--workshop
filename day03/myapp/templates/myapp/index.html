<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Available Chai - Vanja Cottage</title>
    <link href="{% static 'src/output.css' %}" rel="stylesheet">
</head>
<body class="bg-amber-50 min-h-screen flex items-center justify-center">

    <div class="w-full max-w-2xl p-6">
        
        <h1 class="text-3xl font-bold text-center text-amber-900 mb-8">
            ☕ All Available Chai
        </h1>

        <!-- Milk Tea -->
        <div class="flex justify-between items-center bg-white shadow-md rounded-xl p-4 mb-4 hover:shadow-lg transition duration-300">
            <div>
                <h2 class="text-lg font-semibold text-gray-800">Milk Tea</h2>
                <p class="text-gray-500 text-sm">Classic Nepali dudh chiya</p>
            </div>
            <div class="text-right">
                <p class="text-amber-700 font-bold">Rs. 30</p>
                <button class="mt-2 bg-amber-600 text-white px-4 py-1 rounded-lg hover:bg-amber-700 transition">
                    Order
                </button>
            </div>
        </div>

        <!-- Black Tea -->
        <div class="flex justify-between items-center bg-white shadow-md rounded-xl p-4 mb-4 hover:shadow-lg transition duration-300">
            <div>
                <h2 class="text-lg font-semibold text-gray-800">Black Tea</h2>
                <p class="text-gray-500 text-sm">Strong and refreshing</p>
            </div>
            <div class="text-right">
                <p class="text-amber-700 font-bold">Rs. 25</p>
                <button class="mt-2 bg-amber-600 text-white px-4 py-1 rounded-lg hover:bg-amber-700 transition">
                    Order
                </button>
            </div>
        </div>

        <!-- Masala Tea -->
        <div class="flex justify-between items-center bg-white shadow-md rounded-xl p-4 mb-4 hover:shadow-lg transition duration-300">
            <div>
                <h2 class="text-lg font-semibold text-gray-800">Masala Tea</h2>
                <p class="text-gray-500 text-sm">Spiced traditional tea</p>
            </div>
            <div class="text-right">
                <p class="text-amber-700 font-bold">Rs. 40</p>
                <button class="mt-2 bg-amber-600 text-white px-4 py-1 rounded-lg hover:bg-amber-700 transition">
                    Order
                </button>
            </div>
        </div>

        <!-- Ginger Tea -->
        <div class="flex justify-between items-center bg-white shadow-md rounded-xl p-4 mb-4 hover:shadow-lg transition duration-300">
            <div>
                <h2 class="text-lg font-semibold text-gray-800">Ginger Tea</h2>
                <p class="text-gray-500 text-sm">Adrak flavored hot tea</p>
            </div>
            <div class="text-right">
                <p class="text-amber-700 font-bold">Rs. 35</p>
                <button class="mt-2 bg-amber-600 text-white px-4 py-1 rounded-lg hover:bg-amber-700 transition">
                    Order
                </button>
            </div>
        </div>

    </div>

</body>
</html>
