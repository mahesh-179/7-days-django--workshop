{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tea House{% endblock %}</title>

    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>

<!-- Navbar -->
<header>
    <nav>
        <h2 class="logo">MaheshChai Wala</h2>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/menu/">Menu</a></li>
            <li><a href="/about/">About</a></li>
            <li><a href="/contact/">Contact</a></li>
        </ul>
    </nav>
</header>

<!-- Hero Section -->
<section class="hero">
    {% block hero %}
    <h1>Welcome to Chai Wala</h1>
    <p>Freshly brewed tea made with love.</p>
    <a href="/menu/" class="btn">View Menu</a>
    {% endblock %}
</section>

<!-- Main Content -->
<main>
    {% block content %}
    
    {% endblock %}
</main>

<!-- Footer -->
<footer>
    <p>© 2026 Chai Wala Cafe</p>
</footer>

</body>
</html>
